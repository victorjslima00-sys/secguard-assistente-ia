<svg xmlns="http://www.w3.org/2000/svg" width="680" height="460" viewBox="0 0 680 460" role="img" font-family="Arial, Helvetica, sans-serif">
  <title>SecGuard — Arquitetura de Segurança</title>
  <desc>Fluxo de dados do SecGuard com controles OWASP LLM Top 10 (2025) por camada</desc>

  <defs>
    <!-- Arrow marker - dark neutral -->
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M1 1.5 L8 5 L1 8.5" fill="none" stroke="#444441"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <!-- Arrow marker - amber (dashed rejection/fallback) -->
    <marker id="ah-warn" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M1 1.5 L8 5 L1 8.5" fill="none" stroke="#854F0B"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <!-- Arrow marker - teal (KB bidirectional) -->
    <marker id="ah-teal" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M1 1.5 L8 5 L1 8.5" fill="none" stroke="#0F6E56"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- CAIXA 1 — USUÁRIO (gray)                       -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="265" y="20" width="150" height="44" rx="8"
        fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="340" y="47" text-anchor="middle"
        font-size="14" font-weight="600" fill="#2C2C2A">Usuário</text>

  <!-- Arrow 1: Usuário → Streamlit -->
  <line x1="340" y1="64" x2="340" y2="78"
        stroke="#444441" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- CAIXA 2 — INTERFACE STREAMLIT (blue)           -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="200" y="80" width="280" height="44" rx="8"
        fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="340" y="107" text-anchor="middle"
        font-size="14" font-weight="600" fill="#0C447C">Interface Streamlit</text>

  <!-- Arrow 2: Streamlit → InputVal -->
  <line x1="340" y1="124" x2="340" y2="138"
        stroke="#444441" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- CAIXA 3 — VALIDAÇÃO DE ENTRADA (red/security) -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="175" y="140" width="310" height="56" rx="8"
        fill="#FCEBEB" stroke="#A32D2D" stroke-width="1.2"/>
  <text x="330" y="161" text-anchor="middle"
        font-size="14" font-weight="700" fill="#791F1F">🔒 Validação de Entrada</text>
  <text x="330" y="183" text-anchor="middle"
        font-size="11" fill="#A32D2D">LLM01:2025 · Anti-Injection · Scope Check</text>

  <!-- LEFT: Dashed arrow → Recusa (rejection) -->
  <line x1="173" y1="168" x2="60" y2="168"
        stroke="#854F0B" stroke-width="1.2" stroke-dasharray="5 3"
        marker-end="url(#ah-warn)"/>
  <rect x="8" y="152" width="112" height="32" rx="6"
        fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="64" y="165" text-anchor="middle"
        font-size="11" font-weight="600" fill="#633806">⛔ Recusado</text>
  <text x="64" y="179" text-anchor="middle"
        font-size="10" fill="#854F0B">escopo / injection</text>

  <!-- Arrow 3: InputVal → LLM (x=272 = centro do LLM) -->
  <line x1="272" y1="196" x2="272" y2="210"
        stroke="#444441" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- CAIXA 4 — LLM LOCAL (teal)                    -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="175" y="212" width="195" height="56" rx="8"
        fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="272" y="234" text-anchor="middle"
        font-size="14" font-weight="600" fill="#085041">🧠 LLM Local</text>
  <text x="272" y="254" text-anchor="middle"
        font-size="11" fill="#0F6E56">Ollama · Llama 3.2</text>

  <!-- Bidirectional arrows: LLM ↔ KB -->
  <line x1="372" y1="232" x2="402" y2="232"
        stroke="#0F6E56" stroke-width="1.5" marker-end="url(#ah-teal)"/>
  <line x1="402" y1="248" x2="372" y2="248"
        stroke="#0F6E56" stroke-width="1.5" marker-end="url(#ah-teal)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- CAIXA 5 — BASE DE CONHECIMENTO (green)        -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="404" y="212" width="236" height="56" rx="8"
        fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
  <text x="522" y="234" text-anchor="middle"
        font-size="14" font-weight="600" fill="#27500A">📚 Base de Conhecimento</text>
  <text x="522" y="254" text-anchor="middle"
        font-size="11" fill="#3B6D11">JSON + CSV (dados mockados)</text>

  <!-- Arrow 5: LLM → OutputVal -->
  <line x1="272" y1="268" x2="272" y2="282"
        stroke="#444441" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- CAIXA 6 — VALIDAÇÃO DE SAÍDA (red/security)  -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="175" y="284" width="310" height="56" rx="8"
        fill="#FCEBEB" stroke="#A32D2D" stroke-width="1.2"/>
  <text x="330" y="305" text-anchor="middle"
        font-size="14" font-weight="700" fill="#791F1F">✅ Validação de Saída</text>
  <text x="330" y="327" text-anchor="middle"
        font-size="11" fill="#A32D2D">LLM09:2025 · Anti-Alucinação · Verif. contra KB</text>

  <!-- LEFT: Dashed arrow → Fallback -->
  <line x1="173" y1="312" x2="60" y2="312"
        stroke="#185FA5" stroke-width="1.2" stroke-dasharray="5 3"
        marker-end="url(#ah-teal)"/>
  <rect x="8" y="296" width="112" height="32" rx="6"
        fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="64" y="309" text-anchor="middle"
        font-size="11" font-weight="600" fill="#0C447C">🔄 Fallback</text>
  <text x="64" y="323" text-anchor="middle"
        font-size="10" fill="#185FA5">admite limitação</text>

  <!-- Arrow 6: OutputVal → Resposta -->
  <line x1="340" y1="340" x2="340" y2="354"
        stroke="#444441" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- CAIXA 7 — RESPOSTA (gray)                      -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="255" y="356" width="170" height="44" rx="8"
        fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="340" y="383" text-anchor="middle"
        font-size="14" font-weight="600" fill="#2C2C2A">💬 Resposta ao Usuário</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LEGENDA                                         -->
  <!-- ═══════════════════════════════════════════════ -->
  <line x1="175" y1="416" x2="505" y2="416"
        stroke="#D3D1C7" stroke-width="0.5"/>

  <!-- Legenda item 1: Controle OWASP -->
  <rect x="175" y="424" width="11" height="11" rx="2"
        fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
  <text x="191" y="434" font-size="11" fill="#5F5E5A">Controle OWASP LLM Top 10</text>

  <!-- Legenda item 2: LLM -->
  <rect x="340" y="424" width="11" height="11" rx="2"
        fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="356" y="434" font-size="11" fill="#5F5E5A">LLM local (Ollama)</text>

  <!-- Legenda item 3: KB -->
  <rect x="460" y="424" width="11" height="11" rx="2"
        fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
  <text x="476" y="434" font-size="11" fill="#5F5E5A">Base de conhecimento</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- NOTA LGPD / NIST                               -->
  <!-- ═══════════════════════════════════════════════ -->
  <text x="340" y="452" text-anchor="middle"
        font-size="10" fill="#888780">
    ⚡ LLM executa localmente — sem exfiltração de dados  ·  LGPD Art. 46  ·  NIST AI RMF
  </text>
</svg>
